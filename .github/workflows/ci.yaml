name: CI - Build, Scan and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build -t ghcr.io/josipmaric557/ticketing-api:1.0 ./api

      - name: Build Frontend image
        run: |
          docker build -t ghcr.io/josipmaric557/ticketing-frontend:1.0 ./frontend

      - name: Build Worker image
        run: |
          docker build -t ghcr.io/josipmaric557/ticketing-worker:1.0 ./worker

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/josipmaric557/ticketing-api:1.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/josipmaric557/ticketing-frontend:1.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/josipmaric557/ticketing-worker:1.0
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push images to GHCR
        run: |
          docker push ghcr.io/josipmaric557/ticketing-api:1.0
          docker push ghcr.io/josipmaric557/ticketing-frontend:1.0
          docker push ghcr.io/josipmaric557/ticketing-worker:1.0