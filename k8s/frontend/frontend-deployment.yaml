apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: ticketing-sa
      containers:
        - name: frontend
          image: ghcr.io/josipmaric557/ticketing-frontend:1.0
          ports:
            - containerPort: 3000
          env:
            - name: FRONTEND_PORT
              value: "3000"
            - name: API_URL
              value: "http://api:8080"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ticketing-config
                  key: NODE_ENV
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5