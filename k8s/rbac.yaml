apiVersion: v1
kind: ServiceAccount
metadata:
  name: ticketing-sa
  namespace: ticketing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ticketing-role
  namespace: ticketing
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ticketing-rolebinding
  namespace: ticketing
subjects:
  - kind: ServiceAccount
    name: ticketing-sa
    namespace: ticketing
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: ticketing-role